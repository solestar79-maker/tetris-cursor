<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>테트리스</h1>
    </header>

    <main class="game-area">
      <section class="board-section">
        <div id="board" class="board" aria-label="게임 보드"></div>
      </section>

      <aside class="side-panel">
        <div class="info-box">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
        </div>

        <div class="info-box">
          <h2>상태</h2>
          <p id="game-status" class="game-status">대기 중</p>
        </div>

        <div class="button-group">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button">재시작</button>
        </div>

        <div class="info-box controls">
          <h2>조작법</h2>
          <ul>
            <li><kbd>←</kbd> : 왼쪽 이동</li>
            <li><kbd>→</kbd> : 오른쪽 이동</li>
            <li><kbd>↓</kbd> : 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> : 회전</li>
            <li><kbd>Space</kbd> : 즉시 낙하 (hard drop)</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
